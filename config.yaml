# Influenza subtypes and segments to analyze
ha_subtypes:
  - "H1"
  - "H3"
  - "H5"
  - "H7"
  - "H9"

na_subtypes:
  - "N1"
  - "N2"
  - "N6"
  - "N8"
  - "N9"

segments:
  - "PB2"
  - "PB1"
  - "PA"
  - "HA"
  - "NP"
  - "NA"
  - "MP"
  - "NS"

host_groups:
  - "human"
  - "avian"
  - "swine"

geographic_groups:
  - "north_america"
  - "europe"
  - "asia"

# Random branch-partition robustness check: split each global tree's passing
# branches into two halves and compute rates / fitness effects for each half
# independently. The two splits are surfaced downstream as subset_type='split_half'.
split_half_groups:
  - "split_a"
  - "split_b"

split_half_seed: 42

# Data directory paths
data_dir: "../flu-usher/results"
output_dir: "results"

# Optional: genes to ignore in specific segments during coding site creation
ignore_genes:
  PB1:
    - "PB1-F2"
